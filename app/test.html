    <script>
      setup();
      const lineDs = [];
      let resizeTimeout;

      function setup() {
        const svg = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "svg"
        );
        svg.setAttribute("width", window.innerWidth);
        svg.setAttribute("height", window.innerHeight);
        svg.setAttribute(
          "viewBox",
          `0 0 ${window.innerWidth} ${window.innerHeight}`
        );
        svg.setAttribute("fill", "none");
        svg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
        svg.setAttribute("id", "grid-svg");
        document.body.appendChild(svg);

        const verticalLinesNumber = window.innerWidth / 68;
        const horizontalLinesNumber = window.innerHeight / 68;
        for (let i = 0; i < verticalLinesNumber; i++) {
          const path = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path"
          );
          var d = `M${i * 68} 0 C ${i * 68} 14 ${i * 68} 384 ${i * 68} 754 C ${
            i * 68
          } 1126 ${i * 68} 1499 ${i * 68} ${window.innerHeight}`;
          path.setAttribute("d", d);
          path.setAttribute("stroke", "white");
          path.setAttribute("data-type", "vertical");
          svg.appendChild(path);
          lineDs.push(d);
        }
        for (let i = 0; i < horizontalLinesNumber; i++) {
          const path = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "path"
          );
          var d = `M0 ${i * 68} C 14 ${i * 68} 384 ${i * 68} 754 ${
            i * 68
          } C 1126 ${i * 68} 1499 ${i * 68} ${window.innerWidth} ${i * 68}`;
          path.setAttribute("d", d);
          path.setAttribute("stroke", "white");
          path.setAttribute("data-type", "horizontal");
          svg.appendChild(path);
          lineDs.push(d);
        }

        handleInteraction();
      }

      function handleInteraction() {
        const svg = document.getElementById("grid-svg");
        const verticalLines = [
          ...svg.querySelectorAll('path[data-type="vertical"]'),
        ];
        const horizontalLines = [
          ...svg.querySelectorAll('path[data-type="horizontal"]'),
        ];
        const allLines = [...verticalLines, ...horizontalLines];

        allLines.forEach((line) => {
          lineDs.push(line.getAttribute("d"));
        });

        const radius = 400;
        const stretchFactor = 0.2;
        let activeLines = new Set();

        function parseCoordinate(line, isVertical) {
          const d = line.getAttribute("d");
          if (isVertical) {
            return parseFloat(d.split(" ")[0].slice(1)); // Extract x-coordinate
          } else {
            return parseFloat(d.split(" ")[1]); // Extract y-coordinate
          }
        }
        function getLinesWithinRadius(lines, mouseCoord, isVertical) {
          return lines
            .map((line) => {
              const coord = parseCoordinate(line, isVertical);
              const difference = coord - mouseCoord;
              return { line, difference };
            })
            .filter(({ difference }) => Math.abs(difference) <= radius);
        }

        function handleMouseMove(event) {
          const { clientX, clientY } = event;

          // Find lines within the radius
          const linesToHighlight = [
            ...getLinesWithinRadius(verticalLines, clientX, true),
            ...getLinesWithinRadius(horizontalLines, clientY, false),
          ];

          // Reset all previously highlighted lines
          activeLines.forEach((line) => line.setAttribute("stroke", "white"));
          activeLines.clear();

          allLines.forEach((line) => {
            line.setAttribute("d", lineDs[allLines.indexOf(line)]);
            // line.setAttribute("stroke-dasharray", radius * 0.05);
          });

          // Highlight the new lines
          linesToHighlight.forEach(({ line, difference }) => {
            // line.setAttribute("stroke", "red");
            activeLines.add(line);
            // console.log(`Line difference: ${difference}`); // Access the difference here

            // Modify the width/height based on the difference
            const d = lineDs[allLines.indexOf(line)];
            const svgRect = svg.getBoundingClientRect();
            if (line.dataset.type === "vertical") {
              const x = parseFloat(d.split(" ")[0].slice(1));
              const y1 = 0;
              const y2 = 476;
              const y3 = window.innerHeight;
              const controlPointX =
                difference < 0
                  ? (radius + difference) * stretchFactor
                  : (-radius + difference) * stretchFactor;
              const controlPointY = clientY;
              const calcFactorY = Math.exp(
                -Math.pow(
                  (controlPointY - svgRect.height / 2) / (svgRect.height / 4),
                  2
                )
              );
              const controlFactorY = 120 * ease(calcFactorY);
              line.setAttribute(
                "d",
                `M${x} ${y1} C ${x} ${controlPointY} ${x - controlPointX} ${
                  controlPointY - controlFactorY
                } ${x - controlPointX} ${controlPointY} ` +
                  `C ${x - controlPointX} ${
                    controlPointY + controlFactorY
                  } ${x} ${controlPointY} ${x} ${y3}`
              );
            } else {
              const y = parseFloat(d.split(" ")[1]);
              const x1 = 0;
              const x2 = 754;
              const x3 = window.innerWidth;
              const controlPointY =
                difference < 0
                  ? (radius + difference) * stretchFactor
                  : (-radius + difference) * stretchFactor;
              const controlPointX = clientX;
              const calcFactorX = Math.exp(
                -Math.pow(
                  (controlPointX - svgRect.width / 2) / (svgRect.width / 4),
                  2
                )
              );
              const controlFactorX = 80 * ease(calcFactorX);
              line.setAttribute(
                "d",
                `M${x1} ${y} C ${controlPointX} ${y} ${
                  controlPointX - controlFactorX
                } ${y - controlPointY} ${controlPointX} ${y - controlPointY} ` +
                  `C ${controlPointX + controlFactorX} ${
                    y - controlPointY
                  } ${controlPointX} ${y} ${x3} ${y}`
              );
            }
          });
        }

        svg.addEventListener("mousemove", handleMouseMove);
      }

      function ease(t) {
        return (
          1 -
          (1 - t) * (1 - t) * (1 - t) * (1 - t) * (1 - t) * (1 - t) * (1 - t)
        );
      }

      window.addEventListener("resize", () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          document.getElementById("grid-svg").remove();
          lineDs.length = 0;
          setup();
        }, 200);
      });
    </script>
