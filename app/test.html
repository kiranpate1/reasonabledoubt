    <script>
      const svg = document.getElementById("grid-svg");
      const verticalLines = [
        ...svg.querySelectorAll('path[data-type="vertical"]'),
      ];
      const horizontalLines = [
        ...svg.querySelectorAll('path[data-type="horizontal"]'),
      ];
      const allLines = [...verticalLines, ...horizontalLines];

      const lineDs = [];
      allLines.forEach((line) => {
        lineDs.push(line.getAttribute("d"));
      });

      const radius = 400;
      const stretchFactor = 0.2;
      let activeLines = new Set();

      function parseCoordinate(line, isVertical) {
        const d = line.getAttribute("d");
        if (isVertical) {
          return parseFloat(d.split(" ")[0].slice(1)); // Extract x-coordinate
        } else {
          return parseFloat(d.split(" ")[1]); // Extract y-coordinate
        }
      }
      function getLinesWithinRadius(lines, mouseCoord, isVertical) {
        return lines
          .map((line) => {
            const coord = parseCoordinate(line, isVertical);
            const difference = coord - mouseCoord;
            return { line, difference };
          })
          .filter(({ difference }) => Math.abs(difference) <= radius);
      }

      function handleMouseMove(event) {
        const { clientX, clientY } = event;

        // Find lines within the radius
        const linesToHighlight = [
          ...getLinesWithinRadius(verticalLines, clientX, true),
          ...getLinesWithinRadius(horizontalLines, clientY, false),
        ];

        // Reset all previously highlighted lines
        activeLines.forEach((line) => line.setAttribute("stroke", "white"));
        activeLines.clear();

        allLines.forEach((line) => {
          line.setAttribute("d", lineDs[allLines.indexOf(line)]);
          line.setAttribute("stroke-dasharray", "1");
        });

        // Highlight the new lines
        linesToHighlight.forEach(({ line, difference }) => {
          // line.setAttribute("stroke", "red");
          activeLines.add(line);
          // console.log(`Line difference: ${difference}`); // Access the difference here

          // Modify the width/height based on the difference
          const d = lineDs[allLines.indexOf(line)];
          if (line.dataset.type === "vertical") {
            const match = d.match(/M(\d+)\s+(\d+)C?\s*(\d+)\s+(\d+)/);
            const x = parseFloat(match[1]);
            const y1 = 0; // Start point
            const y2 = 982; // End point
            const controlPointX =
              difference < 0
                ? (radius + difference) * stretchFactor
                : (-radius + difference) * stretchFactor; // Use the difference as curve intensity
            const controlPointY = clientY;
            const strokeDashArray = Math.abs(difference) * 0.1;
            line.setAttribute(
              "d",
              `M${x} ${y1} C ${x - controlPointX} ${y1 + controlPointY} ${
                x - controlPointX
              } ${y1 + controlPointY} ${x} ${y2}`
            );
            line.setAttribute("stroke-dasharray", strokeDashArray);
          } else {
            const match = d.match(/M(\d+)\s+(\d+)C?\s*(\d+)\s+(\d+)/);
            const y = parseFloat(match[2]);
            const x1 = 0; // Start point
            const x2 = 1512; // End point
            const controlPointY =
              difference < 0
                ? (radius + difference) * stretchFactor
                : (-radius + difference) * stretchFactor; // Use the difference as curve intensity
            const controlPointX = clientX;
            line.setAttribute(
              "d",
              `M${x1} ${y} C ${x1 + controlPointX} ${y - controlPointY} ${
                x1 + controlPointX
              } ${y - controlPointY} ${x2} ${y}`
            );
          }
        });
      }

      svg.addEventListener("mousemove", handleMouseMove);
    </script>
